        <h1 style="color:#fff;font-size:2.5em;margin-bottom:16px;">Eurobase — The Sovereign BaaS for Europe</h1>
        <p style="color:#FFB300;font-size:1.1em;margin-bottom:24px;">The free, GDPR-native European alternative to Firebase and Supabase. Firebase simplicity. Postgres power. European sovereignty. Closed beta is live — public early access this summer.</p>
        <p>Build modern applications with 6 auth methods, managed PostgreSQL, object storage, realtime subscriptions, edge functions, encrypted vault, cron jobs, webhooks, CLI, and audit logging — fully EU-native, 100% EU infrastructure, zero US jurisdiction, zero DevOps.</p>

        <h2 style="color:#fff;margin-top:40px;">Europe Builds on Infrastructure It Doesn't Control</h2>
