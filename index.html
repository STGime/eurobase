        <h1 style="color:#fff;font-size:2.5em;margin-bottom:16px;">Eurobase — The Sovereign Backend for Europe</h1>
        <p style="color:#FFB300;font-size:1.1em;margin-bottom:24px;">The European alternative to Firebase and Supabase. Firebase simplicity. Postgres power. European sovereignty.</p>
        <p>Build modern applications with authentication, managed PostgreSQL database, object storage, realtime APIs, and serverless functions — fully EU-native, zero US jurisdiction, zero DevOps.</p>

        <h2 style="color:#fff;margin-top:40px;">Europe Builds on Infrastructure It Doesn't Control</h2>
        <p>Modern applications depend on backend platforms for authentication, databases, storage, and serverless logic. Today, most of these platforms are operated by non-European companies and subject to foreign jurisdiction. Developers face a frustrating trade-off: choose world-class developer experience, or choose legal certainty and data sovereignty. Europe deserves both.</p>

        <h2 style="color:#fff;margin-top:40px;">Meet Eurobase — The EU-Native Backend Platform</h2>
        <p>Eurobase is a fully European-operated backend-as-a-service platform combining: secure authentication, managed PostgreSQL with row-level security, realtime data subscriptions, S3-compatible object storage, serverless functions, logging and monitoring, and a developer dashboard. All operated under European legal frameworks with privacy and compliance at the core.</p>

        <h2 style="color:#fff;margin-top:40px;">Why Choose Eurobase Over Firebase or Supabase?</h2>
        <ul>
          <li><strong>100% EU-Owned</strong> — EU-hosted, EU-jurisdiction. No CLOUD Act exposure. Schrems II-safe by design.</li>
          <li><strong>Zero-DevOps</strong> — Postgres, Auth, Storage, Realtime, Functions — ready in seconds.</li>
          <li><strong>GDPR-Native</strong> — Region locking, audit logging, retention controls, automated DPAs.</li>
          <li><strong>Enterprise-Ready</strong> — ISO 27001 roadmap, on-premise and private cloud deployable.</li>
          <li><strong>Migration Kit</strong> — Painless migration path from Firebase and Supabase for EU companies.</li>
        </ul>

        <h2 style="color:#fff;margin-top:40px;">For Developers — Build Fast, Stay Sovereign</h2>
        <p>Start a project in minutes with simple APIs. SQL-based database with row-level security, modern SDKs for web and mobile, realtime subscriptions out of the box, secure object storage, serverless functions for business logic, and transparent usage metrics. No infrastructure tickets. No compliance anxiety. Just build.</p>

        <h2 style="color:#fff;margin-top:40px;">For Enterprises — Sovereign Infrastructure Without Compromise</h2>
        <p>European legal governance, data residency guarantees, compliance documentation, audit logging, role-based access control, secure key management, and enterprise support with SLAs. Backend infrastructure your compliance team can approve.</p>

        <h2 style="color:#fff;margin-top:40px;">Market Opportunity</h2>
        <p>The global Backend-as-a-Service market is $8.4B (2024), growing to $31.1B by 2030 at 24.3% CAGR. The EU cloud market is $177B (2025), growing to $525B by 2032. 72% of EU businesses prioritize data sovereignty in vendor selection. Yet zero EU-native BaaS platforms exist today. Eurobase is positioned at the center of this shift.</p>
